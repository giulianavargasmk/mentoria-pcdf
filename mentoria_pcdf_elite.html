<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mentoria PCDF Elite</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#e2e8f0;
    padding:20px;
}

h1{
    text-align:center;
    color:#f9a8d4;
}

.container{
    max-width:900px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

button{
    background:#1e3a8a;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    margin-bottom:10px;
}

.day{
    border-left:4px solid #f9a8d4;
}

.study{color:#93c5fd;}
.review{color:#f9a8d4;}

.done{
    opacity:0.5;
}

input{
    margin-top:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>Mentoria Elite PCDF</h1>

<div class="topbar">
<button onclick="prevWeek()">⬅️ Semana</button>
<div id="weekTitle">Semana 1</div>
<button onclick="nextWeek()">Semana ➡️</button>
</div>

<div id="planner"></div>

</div>

<script>

let currentWeek = 0;

let weeks = [

/* ================= SEMANA 1 ================= */

[
{
dia:"Dia 1",
conteudo:[
"📚 Penal → Aplicação da lei penal (art. 1–12)",
"📚 Português → Interpretação (inferência)",
"⚖️ Lei seca → CP art. 1–12",
"🧠 Questões → 30 penal + 30 português",
"🔁 Revisão → iniciar ciclo"
]
},

{
dia:"Dia 2",
conteudo:[
"📚 Processo Penal → Inquérito (art. 4–23)",
"📚 Informática → Segurança básica",
"⚖️ Lei seca → CPP art. 4–10",
"🧠 Questões → 60 questões",
"🔁 Revisão → Dia 1"
]
},

{
dia:"Dia 3",
conteudo:[
"📚 Penal → Tipicidade (art. 13–18)",
"📚 Português → Coesão e coerência",
"⚖️ Lei seca → CP art. 13–18",
"🧠 Questões → 30 penal + 30 português",
"🔁 Revisão → Dia 2"
]
},

{
dia:"Dia 4",
conteudo:[
"📚 Constitucional → Direitos fundamentais",
"📚 RLM → proposições",
"⚖️ Lei seca → CF art. 5",
"🧠 Questões → 60",
"🔁 Revisão → Dia 3"
]
},

{
dia:"Dia 5",
conteudo:[
"📚 Penal → Ilicitude",
"📚 Processo Penal → Provas",
"⚖️ Lei seca → CPP art. 155–157",
"🧠 Questões → 60",
"🔁 Revisão → Dia 4"
]
},

{
dia:"Dia 6",
conteudo:[
"📚 Estatística → média",
"📚 Contabilidade → patrimônio",
"⚖️ Lei seca → revisão geral",
"🧠 Questões → 40",
"🔁 Revisão → semana"
]
},

{
dia:"Dia 7",
conteudo:[
"🧠 Simulado 80 questões",
"🔁 Revisão completa",
"📊 Análise de desempenho"
]
}
],

/* ================= SEMANA 2 ================= */

[
{
dia:"Dia 8",
conteudo:[
"📚 Penal → Culpabilidade",
"📚 Português → Concordância",
"⚖️ Lei seca → CP art. 20–23",
"🧠 Questões → 60",
"🔁 Revisão → Dia 1"
]
},

{
dia:"Dia 9",
conteudo:[
"📚 Processo Penal → Prisões",
"📚 Informática → redes",
"⚖️ Lei seca → CPP art. 282–310",
"🧠 Questões → 60",
"🔁 Revisão → Dia 2"
]
}

]

];

function render(){
    let planner = document.getElementById("planner");
    planner.innerHTML="";
    
    document.getElementById("weekTitle").innerText = "Semana "+(currentWeek+1);

    weeks[currentWeek].forEach((d,i)=>{
        let div = document.createElement("div");
        div.className="card day";

        let html = `<h3>${d.dia}</h3>`;

        d.conteudo.forEach(c=>{
            html += `<div>${c}</div>`;
        });

        html += `
        % acertos:<br>
        <input type="number">
        <br>
        <button onclick="this.parentElement.classList.add('done')">Concluir</button>
        `;

        div.innerHTML = html;
        planner.appendChild(div);
    });
}

function nextWeek(){
    if(currentWeek < weeks.length-1){
        currentWeek++;
        render();
    }
}

function prevWeek(){
    if(currentWeek > 0){
        currentWeek--;
        render();
    }
}

render();

</script>

</body>
</html>
