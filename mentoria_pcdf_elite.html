<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mentoria Elite PCDF PRO</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:15px;
}

h1 {text-align:center;}

.dashboard {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
}

.day {
    background:#1e293b;
    padding:12px;
    border-radius:10px;
}

.study {color:#f97316;}
.review {color:#38bdf8;}
.done {opacity:0.5;}

button {
    margin-top:5px;
    padding:5px 10px;
    background:#22c55e;
    border:none;
    border-radius:5px;
    color:white;
}

input {width:60px;}
</style>
</head>

<body>

<h1>🚔 Mentoria Elite PCDF PRO</h1>

<div class="dashboard">
Progresso: <span id="progress">0</span>%<br>
Desempenho geral: <span id="performance">0</span>%<br><br>

Português: <span id="port">0</span>% |
Penal: <span id="penal">0</span>% |
Processo: <span id="proc">0</span>% |
Outras: <span id="outros">0</span>%
<br><br>
🧠 Diagnóstico: <span id="diagnostic">-</span>
</div>

<div class="grid" id="planner"></div>

<script>

let data = JSON.parse(localStorage.getItem("pcdf")) || {
    completed:0,
    scores:[],
    subjects:{
        "Português":[],
        "Penal":[],
        "Processo":[],
        "Outros":[]
    }
};

function save(){
    localStorage.setItem("pcdf", JSON.stringify(data));
}

function avg(arr){
    if(arr.length==0) return 0;
    return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}

function update(){
    document.getElementById("progress").innerText = Math.round((data.completed/90)*100);

    let geral = avg(data.scores);
    document.getElementById("performance").innerText = geral;

    let p = avg(data.subjects["Português"]);
    let pe = avg(data.subjects["Penal"]);
    let pr = avg(data.subjects["Processo"]);
    let o = avg(data.subjects["Outros"]);

    document.getElementById("port").innerText = p;
    document.getElementById("penal").innerText = pe;
    document.getElementById("proc").innerText = pr;
    document.getElementById("outros").innerText = o;

    let weakest = Math.min(p, pe, pr);

    if(weakest==p) diagnostic.innerText="Reforçar Português";
    else if(weakest==pe) diagnostic.innerText="Reforçar Penal";
    else diagnostic.innerText="Reforçar Processo Penal";

    save();
}

function concluir(id, input, subject){
    let val = parseInt(input.value);

    if(!val || val<0 || val>100){
        alert("Digite % válida");
        return;
    }

    let el = document.getElementById(id);

    if(!el.classList.contains("done")){
        el.classList.add("done");
        data.completed++;
        data.scores.push(val);

        if(subject in data.subjects){
            data.subjects[subject].push(val);
        } else {
            data.subjects["Outros"].push(val);
        }
    }

    update();
}

let plano = [
["Penal","Português","Lei seca"],
["Processo","Informática","Revisão"],
["Constitucional","RLM","Lei seca"],
["Administrativo","Português","Revisão"],
["Penal","Processo","Lei seca"],
["Estatística","Contabilidade","Revisão"],
["Simulado","Revisão geral","Análise"]
];

let planner = document.getElementById("planner");

for(let i=1;i<=90;i++){
    let dia = plano[i%plano.length];

    let div = document.createElement("div");
    div.className="day";
    div.id="d"+i;

    div.innerHTML = `
    <h3>📅 Dia ${i}</h3>

    <div class="study">📚 ${dia[0]}</div>
    <div class="study">📚 ${dia[1]}</div>
    <div class="review">🔁 ${dia[2]}</div>

    ⏱️ 4h total<br>
    🎯 60 questões<br>
    ⚖️ Lei seca diária<br>

    % acertos:<br>
    <input type="number" id="s${i}">
    <br>
    <button onclick="concluir('d${i}', s${i}, '${dia[0]}')">Concluir</button>
    `;

    planner.appendChild(div);
}

update();

</script>

</body>
</html>
