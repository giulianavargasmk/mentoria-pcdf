<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PCDF Elite</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    background:#1e293b;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    color:#f9a8d4;
}

/* MAIN */
.main{
    margin-left:250px;
    padding:20px;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* TITLE */
.title{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

/* GRID SEMANA */
.week-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:15px;
}

/* CARD SEMANA */
.day{
    min-height:180px;
}

/* TEXTO */
.disciplina{
    font-weight:bold;
    color:#93c5fd;
}

.assunto{
    font-size:13px;
    margin-bottom:5px;
}

.review{color:#f9a8d4;}
</style>

</head>

<body>

<div class="sidebar">
<h2>PCDF Elite</h2>

<button onclick="show('daily')">Meta diária</button>
<button onclick="show('weekly')">Meta semanal</button>
<button onclick="show('performance')">Desempenho</button>
<button onclick="show('questions')">Questões</button>
</div>

<div class="main">

<!-- META DIÁRIA -->
<div id="daily" class="section active">

<div class="title">📅 Meta diária</div>

<div id="dailyContent"></div>

<input type="number" id="scoreDay">
<button onclick="finishDay()">Concluir dia</button>

</div>

<!-- META SEMANAL -->
<div id="weekly" class="section">

<div class="title">📅 Semana Atual</div>

<div id="weekGrid" class="week-grid"></div>

</div>

<!-- DESEMPENHO -->
<div id="performance" class="section">
<div class="title">📊 Desempenho</div>

<div class="card">
Dias: <span id="days">0</span><br>
Média: <span id="avg">0</span>%
</div>

<div class="card">
<div style="background:#1e3a8a;height:20px;width:0%" id="bar"></div>
</div>

</div>

<!-- QUESTÕES -->
<div id="questions" class="section">
<div class="title">🧠 Questões</div>

<div class="card">
Penal: feitas <input> acertos <input> erros <input>
</div>

</div>

</div>

<script>

/* PLANO */
let plan = [];
let subjects = [
["Penal","Teoria do crime (art.13-18)"],
["Português","Interpretação"],
["Processo","Inquérito"],
["Constitucional","Art.5"],
["RLM","Lógica"],
["Informática","Segurança"],
["Estatística","Média"],
["Contabilidade","Patrimônio"]
];

for(let i=0;i<90;i++){
let s1 = subjects[i%subjects.length];
let s2 = subjects[(i+1)%subjects.length];

plan.push({
rev24:`Revisar: ${subjects[(i-1+subjects.length)%subjects.length][0]}`,
disc1:s1,
disc2:s2,
questoes:"60 questões (30+30)",
revLong:`Revisar 7d/30d`,
lei:"Lei seca correspondente"
});
}

/* DATA */
let data = JSON.parse(localStorage.getItem("pcdf")) || {
day:0,
scores:[]
};

function save(){
localStorage.setItem("pcdf", JSON.stringify(data));
}

/* RENDER META DIÁRIA */
function renderDay(){
let d = plan[data.day];

document.getElementById("dailyContent").innerHTML = `

<div class="card review">🔁 ${d.rev24}</div>

<div class="card">
<div class="disciplina">📚 ${d.disc1[0]} (1h30)</div>
<div class="assunto">${d.disc1[1]}</div>
</div>

<div class="card">
<div class="disciplina">📚 ${d.disc2[0]} (1h30)</div>
<div class="assunto">${d.disc2[1]}</div>
</div>

<div class="card">🧠 ${d.questoes}</div>

<div class="card review">🔁 ${d.revLong}</div>

<div class="card">⚖️ ${d.lei}</div>

`;
}

/* SEMANA */
function renderWeek(){
let grid = document.getElementById("weekGrid");
grid.innerHTML="";

let start = Math.floor(data.day/7)*7;

for(let i=0;i<7;i++){
let d = plan[start+i];

let div = document.createElement("div");
div.className="card day";

div.innerHTML = `
<b>Dia ${start+i+1}</b><br><br>

<div class="disciplina">${d.disc1[0]}</div>
<div class="assunto">${d.disc1[1]}</div>

<br>

<div class="disciplina">${d.disc2[0]}</div>
<div class="assunto">${d.disc2[1]}</div>

`;
grid.appendChild(div);
}
}

/* FINALIZAR */
function finishDay(){
let val = parseInt(document.getElementById("scoreDay").value);
if(!val){alert("Digite %");return;}

data.scores.push(val);
data.day++;

update();
save();
renderDay();
renderWeek();
}

/* DESEMPENHO */
function update(){
let avg = 0;

if(data.scores.length){
avg = data.scores.reduce((a,b)=>a+b)/data.scores.length;
}

document.getElementById("days").innerText = data.day;
document.getElementById("avg").innerText = Math.round(avg);
document.getElementById("bar").style.width = avg+"%";
}

/* MENU */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

renderDay();
renderWeek();
update();

</script>

</body>
</html>
