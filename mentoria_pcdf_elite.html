<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mentoria PCDF Elite</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    background:#1e293b;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    color:#f9a8d4;
}

.menu button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e3a8a;
    color:white;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

/* CARDS */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    border-left:4px solid #f9a8d4;
}

.study{color:#93c5fd;}
.review{color:#f9a8d4;}

.done{
    opacity:0.5;
}

/* DASHBOARD */
.dashboard{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="sidebar">
    <h2>PCDF Elite</h2>

    <div class="menu">
        <button onclick="goWeek(0)">Semana 1</button>
        <button onclick="goWeek(1)">Semana 2</button>
        <button onclick="goWeek(2)">Semana 3</button>
    </div>
</div>

<div class="main">

<div class="dashboard">
Progresso: <span id="progress">0</span>%<br>
Desempenho médio: <span id="performance">0</span>%<br>
</div>

<div class="topbar">
<button onclick="prevWeek()">⬅️</button>
<h2 id="weekTitle">Semana 1</h2>
<button onclick="nextWeek()">➡️</button>
</div>

<div id="planner"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("pcdf")) || {
    completed:0,
    scores:[]
};

function save(){
    localStorage.setItem("pcdf", JSON.stringify(data));
}

function avg(arr){
    if(arr.length==0) return 0;
    return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}

function update(){
    document.getElementById("progress").innerText = Math.round((data.completed/90)*100);
    document.getElementById("performance").innerText = avg(data.scores);
    save();
}

function concluir(id, input){
    let val = parseInt(input.value);

    if(!val || val<0 || val>100){
        alert("Digite % válida");
        return;
    }

    let el = document.getElementById(id);

    if(!el.classList.contains("done")){
        el.classList.add("done");
        data.completed++;
        data.scores.push(val);
    }

    update();
}

let currentWeek = 0;

let weeks = [

/* SEMANA 1 */
[
["Penal → art. 1–12","Português → interpretação","Lei seca CP","60 questões"],
["Processo → inquérito","Informática","Lei seca CPP","60 questões"],
["Penal → tipicidade","Português → coesão","Lei seca","60 questões"],
["Constitucional → art. 5","RLM","Lei seca","60 questões"],
["Penal → ilicitude","Processo → provas","Lei seca","60 questões"],
["Estatística","Contabilidade","Revisão","40 questões"],
["Simulado","Revisão geral","Análise",""]
],

/* SEMANA 2 */
[
["Penal → culpabilidade","Português → concordância","Lei seca","60 questões"],
["Processo → prisão","Informática","Lei seca","60 questões"]
]

];

function render(){
    let planner = document.getElementById("planner");
    planner.innerHTML="";
    
    document.getElementById("weekTitle").innerText = "Semana "+(currentWeek+1);

    weeks[currentWeek].forEach((d,i)=>{
        let div = document.createElement("div");
        div.className="card";
        div.id="d"+i;

        div.innerHTML = `
        <h3>Dia ${i+1}</h3>

        <div class="study">${d[0]}</div>
        <div class="study">${d[1]}</div>
        <div class="review">${d[2]}</div>
        <div>🧠 ${d[3]}</div>

        % acertos:<br>
        <input type="number" id="s${i}">
        <br>
        <button onclick="concluir('d${i}', s${i})">Concluir</button>
        `;

        planner.appendChild(div);
    });
}

function nextWeek(){
    if(currentWeek < weeks.length-1){
        currentWeek++;
        render();
    }
}

function prevWeek(){
    if(currentWeek > 0){
        currentWeek--;
        render();
    }
}

function goWeek(n){
    currentWeek = n;
    render();
}

render();

</script>

</body>
</html>
