<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PCDF Elite 90 Dias</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    background:#1e293b;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    color:#f9a8d4;
}

.menu button{
    width:100%;
    margin:8px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e3a8a;
    color:white;
}

/* MAIN */
.main{
    margin-left:250px;
    padding:20px;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* CARD */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

/* GRID */
.week-grid{
    display:grid;
    grid-template-columns: repeat(7, minmax(200px,1fr));
    gap:12px;
}

/* COLORS */
.study{color:#93c5fd;}
.review{color:#f9a8d4;}

.done{opacity:0.5;}

.title{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>PCDF Elite</h2>

<div class="menu">
<button onclick="show('daily')">Meta diária</button>
<button onclick="show('weekly')">Meta semanal</button>
<button onclick="show('performance')">Desempenho</button>
<button onclick="show('questions')">Questões</button>
</div>
</div>

<div class="main">

<!-- META DIÁRIA -->
<div id="daily" class="section active">
<div class="title">📅 Meta de Hoje</div>

<div id="today" class="card"></div>

<input type="number" id="scoreDay">
<button onclick="finishDay()">Concluir dia</button>
</div>

<!-- SEMANA -->
<div id="weekly" class="section">
<div class="title">📅 Semana Atual</div>

<div id="weekGrid" class="week-grid"></div>

<div class="card">
⚖️ Lei seca da semana + revisões automáticas aplicadas
</div>
</div>

<!-- DESEMPENHO -->
<div id="performance" class="section">
<div class="title">📊 Desempenho</div>

<div class="card">
Dias concluídos: <span id="days">0</span><br>
Média: <span id="avg">0</span>%
</div>

<div class="card">
<div style="background:#1e3a8a;height:20px;width:0%" id="bar"></div>
</div>
</div>

<!-- QUESTÕES -->
<div id="questions" class="section">
<div class="title">🧠 Questões</div>

<div class="card">
Penal: feitas <input> acertos <input> erros <input>
</div>

<div class="card">
Português: feitas <input> acertos <input> erros <input>
</div>

</div>

</div>

<script>

let plan = [];
let subjects = [
"Penal → teoria do crime",
"Português → interpretação",
"Processo → inquérito",
"Constitucional → art.5",
"RLM → lógica",
"Informática",
"Estatística",
"Contabilidade"
];

/* GERAR 90 DIAS */
for(let i=0;i<90;i++){
    let s1 = subjects[i%subjects.length];
    let s2 = subjects[(i+1)%subjects.length];

    plan.push({
        teoria:[s1,s2],
        lei:"Lei seca correspondente",
        questoes:"60 questões",
        revisao:`Revisar D-${i-1}, D-${i-7}, D-${i-30}`
    });
}

/* DATA */
let data = JSON.parse(localStorage.getItem("pcdf")) || {
day:0,
scores:[]
};

function save(){
localStorage.setItem("pcdf", JSON.stringify(data));
}

/* MOSTRAR DIA */
function renderDay(){
let d = plan[data.day];

document.getElementById("today").innerHTML = `
<div class="study">📚 ${d.teoria[0]}</div>
<div class="study">📚 ${d.teoria[1]}</div>
<div class="review">⚖️ ${d.lei}</div>
<div>🧠 ${d.questoes}</div>
<div>🔁 ${d.revisao}</div>
`;
}

/* SEMANA */
function renderWeek(){
let grid = document.getElementById("weekGrid");
grid.innerHTML="";

let start = Math.floor(data.day/7)*7;

for(let i=0;i<7;i++){
let d = plan[start+i];

let div = document.createElement("div");
div.className="card";

div.innerHTML = `
<b>Dia ${start+i+1}</b><br>
📚 ${d.teoria[0]}<br>
📚 ${d.teoria[1]}<br>
⚖️ Lei seca<br>
🧠 60 questões
`;

grid.appendChild(div);
}
}

/* FINALIZAR DIA */
function finishDay(){
let val = parseInt(document.getElementById("scoreDay").value);
if(!val){alert("Digite %");return;}

data.scores.push(val);
data.day++;

update();
save();
renderDay();
renderWeek();
}

/* DESEMPENHO */
function update(){
let avg = 0;
if(data.scores.length){
avg = data.scores.reduce((a,b)=>a+b)/data.scores.length;
}

document.getElementById("days").innerText = data.day;
document.getElementById("avg").innerText = Math.round(avg);
document.getElementById("bar").style.width = avg+"%";
}

/* MENU */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

renderDay();
renderWeek();
update();

</script>

</body>
</html>
